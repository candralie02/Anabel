<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anabel Pink Neon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #ff4fd8, #17001f 45%, #050008);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      width: 90%;
      max-width: 520px;
      text-align: center;
      padding: 45px 30px;
      border-radius: 25px;
      background: rgba(255, 0, 180, 0.15);
      border: 2px solid #ff4fd8;
      box-shadow:
        0 0 20px #ff4fd8,
        0 0 50px #ff00cc,
        inset 0 0 25px rgba(255, 79, 216, 0.5);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 15px;
      text-shadow:
        0 0 10px #ff4fd8,
        0 0 25px #ff00cc,
        0 0 50px #ff1493;
    }

    p {
      font-size: 17px;
      color: #ffd6f5;
      line-height: 1.7;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 35px;
      border-radius: 40px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      background: linear-gradient(45deg, #ff1493, #ff4fd8, #ff00cc);
      box-shadow:
        0 0 15px #ff4fd8,
        0 0 35px #ff00cc;
    }

    .btn:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 25px #ff4fd8,
        0 0 55px #ff00cc;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome</h1>
    <p>
      Di persatuan bangsa
    </p>

    <a href="#" class="btn">MASUK SEKARANG</a>
  </div>

</body>
</html>
