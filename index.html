<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Pink Neon</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #ff4fd8, #17001f 45%, #050008);
      color: white;
      overflow: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.7s ease;
      position: absolute;
      top: 0;
      left: 0;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(1.1);
    }

    .box {
      width: 90%;
      max-width: 520px;
      text-align: center;
      padding: 45px 35px;
      border-radius: 25px;
      background: rgba(255, 0, 180, 0.15);
      border: 2px solid #ff4fd8;
      box-shadow:
        0 0 20px #ff4fd8,
        0 0 60px #ff00cc,
        inset 0 0 25px rgba(255, 79, 216, 0.5);
      animation: glowBox 2s infinite alternate;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 18px;
      text-shadow:
        0 0 10px #ff4fd8,
        0 0 25px #ff00cc,
        0 0 50px #ff1493;
    }

    p {
      font-size: 17px;
      color: #ffd6f5;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    button {
      border: none;
      cursor: pointer;
      padding: 15px 42px;
      border-radius: 40px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      background: linear-gradient(45deg, #ff1493, #ff4fd8, #ff00cc);
      box-shadow:
        0 0 15px #ff4fd8,
        0 0 35px #ff00cc;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.08);
      box-shadow:
        0 0 25px #ff4fd8,
        0 0 60px #ff00cc,
        0 0 90px #ff1493;
    }

    .room {
      background:
        radial-gradient(circle at center, rgba(255, 0, 204, 0.25), transparent 38%),
        linear-gradient(135deg, #050008, #26002e, #09000c);
    }

    .room-box {
      width: 90%;
      max-width: 850px;
      min-height: 430px;
      padding: 40px;
      border-radius: 30px;
      text-align: center;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid #ff4fd8;
      box-shadow:
        0 0 25px #ff4fd8,
        0 0 70px #ff00cc,
        inset 0 0 30px rgba(255, 79, 216, 0.35);
      backdrop-filter: blur(12px);
      animation: masukRoom 0.8s ease;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin: 30px 0;
    }

    .card {
      padding: 25px 15px;
      border-radius: 18px;
      background: rgba(255, 0, 180, 0.14);
      border: 1px solid #ff4fd8;
      box-shadow: 0 0 18px rgba(255, 0, 204, 0.6);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow:
        0 0 20px #ff4fd8,
        0 0 45px #ff00cc;
    }

    .card h3 {
      margin-bottom: 10px;
      color: #ffffff;
      text-shadow: 0 0 12px #ff00cc;
    }

    .card p {
      font-size: 14px;
      margin-bottom: 0;
    }

    .back {
      margin-top: 10px;
      background: linear-gradient(45deg, #5c005c, #ff1493);
    }

    .particle {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #ff4fd8;
      border-radius: 50%;
      box-shadow: 0 0 15px #ff00cc;
      animation: particleMove 5s linear infinite;
    }

    .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 25%; animation-delay: 1s; }
    .particle:nth-child(3) { left: 50%; animation-delay: 2s; }
    .particle:nth-child(4) { left: 70%; animation-delay: 3s; }
    .particle:nth-child(5) { left: 88%; animation-delay: 4s; }

    @keyframes glowBox {
      from {
        box-shadow:
          0 0 20px #ff4fd8,
          0 0 60px #ff00cc;
      }
      to {
        box-shadow:
          0 0 35px #ff4fd8,
          0 0 90px #ff00cc,
          inset 0 0 35px rgba(255, 79, 216, 0.6);
      }
    }

    @keyframes masukRoom {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(40px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes particleMove {
      from {
        bottom: -20px;
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      to {
        bottom: 100%;
        opacity: 0;
        transform: translateX(80px);
      }
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 38px;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .room-box {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>
  <div class="particle"></div>

  <!-- HALAMAN AWAL -->
  <section class="page" id="homePage">
    <div class="box">
      <h1>Welcome</h1>
      <p>Di persatuan bangsa</p>
      <button onclick="masukRoom()">SILAKAN MASUK</button>
    </div>
  </section>

  <!-- RUANGAN BARU -->
  <section class="page room hidden" id="roomPage">
    <div class="room-box">
      <h1>Ruangan Utama</h1>
      <p>
        Selamat datang di ruangan pink neon.
        Halaman ini muncul setelah tombol SILAKAN MASUK diklik.
      </p>

      <div class="cards">
        <div class="card">
          <h3>Menu 1</h3>
          <p>Area informasi utama.</p>
        </div>

        <div class="card">
          <h3>Menu 2</h3>
          <p>Area konten tambahan.</p>
        </div>

        <div class="card">
          <h3>Menu 3</h3>
          <p>Area fitur lainnya.</p>
        </div>
      </div>

      <button class="back" onclick="kembaliHome()">KEMBALI</button>
    </div>
  </section>

  <script>
    function masukRoom() {
      document.getElementById("homePage").classList.add("hidden");
      document.getElementById("roomPage").classList.remove("hidden");
    }

    function kembaliHome() {
      document.getElementById("roomPage").classList.add("hidden");
      document.getElementById("homePage").classList.remove("hidden");
    }
  </script>

</body>
</html>
